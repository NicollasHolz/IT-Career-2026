<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaning Quote Calculator</title>
    <link rel="stylesheet" href="practice.css">
</head>
<body>
    <div class="container">
        <h1>Cleaning Quote Calculator</h1>
        <div class="card">
            <input type="text" id="customerName" placeholder="Name">
            <select id="serviceType">
                <option value="">Select service type</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Car Detailing">Car Detailing</option>
                <option value="Pressure Washing">Pressure Washing</option>
                <option value="Furniture Delivery">Furniture Delivery</option>
            </select>
            <input type="number" id="hours" placeholder="Hours">
            <input type="number" id="hourlyRate" placeholder="Hourly Rate">
            <input type="number" id="extraFee" placeholder="Extra Fee">
            <input type="number" id="discount" placeholder="Discount $">

            <button id="calculate" class="primary-button">Calculate</button>
            <div id="result"></div>
        </div>

        <div class="card">
            <h2>Saved Quotes</h2>
            <button id="clearAll" class="danger-button">Clear All Quotes</button>
            <div id="summary"></div>
            <ul id="quotesList"></ul>
        </div>
    </div>

    <script src="practice.js"></script>
</body>
</html>
